<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Resume versus CV article cover</title>
  <desc id="desc">Two professional documents side by side comparing resume and CV structure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="160" y="130" width="330" height="430" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="710" y="130" width="330" height="430" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="210" y="190" width="150" height="24" rx="12" fill="#0f172a"/>
  <rect x="210" y="260" width="220" height="16" rx="8" fill="#94a3b8"/>
  <rect x="210" y="300" width="180" height="16" rx="8" fill="#cbd5e1"/>
  <rect x="210" y="360" width="230" height="16" rx="8" fill="#10b981"/>
  <rect x="760" y="190" width="90" height="24" rx="12" fill="#ffffff"/>
  <rect x="760" y="260" width="220" height="16" rx="8" fill="#64748b"/>
  <rect x="760" y="300" width="180" height="16" rx="8" fill="#64748b"/>
  <rect x="760" y="360" width="230" height="16" rx="8" fill="#f59e0b"/>
  <circle cx="600" cy="340" r="68" fill="#2563eb"/>
  <text x="562" y="356" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800">VS</text>
  <text x="160" y="620" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">RESUME VS CV</text>
</svg>
