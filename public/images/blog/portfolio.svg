<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio article cover</title>
  <desc id="desc">A portfolio website layout showing project cards and proof of work indicators.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.48" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="135" y="120" width="930" height="420" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <rect x="185" y="170" width="830" height="50" rx="8" fill="#1e293b"/>
  <circle cx="220" cy="195" r="9" fill="#ef4444"/>
  <circle cx="250" cy="195" r="9" fill="#f59e0b"/>
  <circle cx="280" cy="195" r="9" fill="#10b981"/>
  <rect x="210" y="275" width="230" height="170" rx="8" fill="#ffffff"/>
  <rect x="485" y="275" width="230" height="170" rx="8" fill="#ffffff"/>
  <rect x="760" y="275" width="230" height="170" rx="8" fill="#ffffff"/>
  <rect x="245" y="320" width="145" height="18" rx="9" fill="#0f172a"/>
  <rect x="520" y="320" width="145" height="18" rx="9" fill="#10b981"/>
  <rect x="795" y="320" width="145" height="18" rx="9" fill="#2563eb"/>
  <rect x="245" y="370" width="110" height="14" rx="7" fill="#94a3b8"/>
  <rect x="520" y="370" width="110" height="14" rx="7" fill="#94a3b8"/>
  <rect x="795" y="370" width="110" height="14" rx="7" fill="#94a3b8"/>
  <text x="185" y="600" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">PORTFOLIO PROOF</text>
