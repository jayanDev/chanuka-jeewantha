<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Interview preparation article cover</title>
  <desc id="desc">Two conversation panels with interview question and answer signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="145" y="150" width="400" height="265" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="655" y="220" width="400" height="265" rx="8" fill="#0f172a" filter="url(#shadow)"/>
  <circle cx="235" cy="245" r="48" fill="#2563eb"/>
  <circle cx="745" cy="315" r="48" fill="#10b981"/>
  <rect x="315" y="220" width="165" height="20" rx="10" fill="#0f172a"/>
  <rect x="315" y="270" width="110" height="16" rx="8" fill="#94a3b8"/>
  <rect x="825" y="290" width="165" height="20" rx="10" fill="#ffffff"/>
  <rect x="825" y="340" width="130" height="16" rx="8" fill="#64748b"/>
  <path d="M500 414l56 74 4-96" fill="#ffffff"/>
  <path d="M700 485l-56 74-4-96" fill="#0f172a"/>
  <text x="145" y="570" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800">INTERVIEW READY</text>
</svg>
